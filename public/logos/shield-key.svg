<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Sharp greyscale metallic gradient for light mode -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" /> <!-- white -->
      <stop offset="50%" stop-color="#f3f4f6" /> <!-- gray-100 -->
      <stop offset="100%" stop-color="#e5e7eb" /> <!-- gray-200 -->
    </linearGradient>
    <linearGradient id="shieldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1d5db" /> <!-- gray-300 -->
      <stop offset="100%" stop-color="#9ca3af" /> <!-- gray-400 -->
    </linearGradient>
    
    <!-- Outer glow/shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.10" />
    </filter>

    <!-- Inner shadow for cutout -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="1"/>
      <feGaussianBlur stdDeviation="1.5" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.3" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Outer metallic border -->
  <path fill="url(#shieldBorder)" d="M100 15 L15 57.5 L15 120 C15 165 60 195 100 205 C140 195 185 165 185 120 L185 57.5 Z" filter="url(#dropShadow)" />
  
  <!-- Main Shield Body -->
  <path fill="url(#shieldGrad)" d="M100 22 L22 61 L22 120 C22 158 60 187 100 196 C140 187 178 158 178 120 L178 61 Z"/>
  
  <!-- Highlights and details on shield -->
  <!-- Subtle diagonal slash for metallic shine -->
  <path fill="white" fill-opacity="0.6" d="M100 22 L22 61 L22 120 C22 135 28 148 37 160 L130 22 Z"/>
  
  <!-- Left half highlight -->
  <path fill="white" fill-opacity="0.3" d="M100 22 L22 61 L22 120 C22 158 60 187 100 196 Z"/>

  <!-- Key Cutout Wrapper - Modern / Geometric Key Shape -->
  <g fill="#111827" filter="url(#innerShadow)">
    
    <!-- Key Bow (Handle) - Modern diamond/hexagonal shape -->
    <path d="M50 100 L65 80 L85 80 L100 100 L85 120 L65 120 Z" />
    
    <!-- Inner cutout for the bow -->
    <circle cx="75" cy="100" r="8" fill="url(#shieldGrad)" />

    <!-- Key Stem - Thicker and more prominent -->
    <rect x="95" y="94" width="60" height="12" rx="2" />

    <!-- Key Teeth / Wards (modern, blocky cutouts) -->
    <!-- First Ward -->
    <path d="M125 106 L125 122 L137 122 L137 106 Z" rx="1" />
    <!-- Second Ward -->
    <path d="M142 106 L142 116 L152 116 L152 106 Z" rx="1" />
    
  </g>
</svg>
